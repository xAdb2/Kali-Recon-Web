{% extends "base.html" %}
{% block title %}登入 — {{ SITE_NAME }}{% endblock %}
{% block content %}
<section class="card narrow">
  <h1>登入</h1>
  {% if form.errors %}<p class="error">帳號或密碼錯誤。</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    <label>使用者名稱
      <input type="text" name="username" autofocus required>
    </label>
    <label>密碼
      <input type="password" name="password" required>
    </label>
    <button type="submit" class="primary">登入</button>
  </form>
</section>
{% endblock %}
