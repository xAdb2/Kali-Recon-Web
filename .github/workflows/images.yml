name: images

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Lowercase image prefix
        id: prep
        run: echo "prefix=$(echo '${{ env.REGISTRY }}/${{ github.repository }}' | tr 'A-Z' 'a-z')" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: App image metadata
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.prefix }}-app
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app.Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scanner image metadata
        id: meta-scanner
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.prefix }}-scanner
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
      - name: Build & push scanner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/scanner.Dockerfile
          push: true
          tags: ${{ steps.meta-scanner.outputs.tags }}
          labels: ${{ steps.meta-scanner.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
