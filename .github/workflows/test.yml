name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff
        run: python -m ruff check .
      - name: Django system checks
        env:
          USE_SQLITE: "1"
          DJANGO_ALLOW_INSECURE_SECRET: "1"
        run: python manage.py check
      - name: Migration consistency
        env:
          USE_SQLITE: "1"
          DJANGO_ALLOW_INSECURE_SECRET: "1"
        run: python manage.py makemigrations --check --dry-run
      - name: Pytest
        env:
          USE_SQLITE: "1"
          DJANGO_ALLOW_INSECURE_SECRET: "1"
        run: python -m pytest -q
      - name: docker compose config
        run: |
          cp .env.example .env
          docker compose config -q

  build-images:
    runs-on: ubuntu-latest
    # Build images on main or whenever Docker files change on a PR.
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app.Dockerfile
          push: false
          load: true
          tags: kalirecon-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build scanner image
        # Heavy Kali image; only on main to keep PR CI fast.
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/scanner.Dockerfile
          push: false
          load: true
          tags: kalirecon-scanner:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
